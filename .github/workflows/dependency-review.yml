name: Dependency Review

# PR-scoped: the action diffs the base and head manifests, so it only makes
# sense on pull_request (the skybox copy is misfired on workflow_dispatch,
# which has no base to diff — this is the corrected shape).
on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

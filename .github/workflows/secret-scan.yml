name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: "0"   # full history so old commits are scanned too
          persist-credentials: "false"
      - name: Install gitleaks (pinned, checksum-verified)
        run: |
          set -euo pipefail
          V=8.30.1
          F="gitleaks_${V}_linux_x64.tar.gz"
          curl -fsSLo "$F" "https://github.com/gitleaks/gitleaks/releases/download/v${V}/${F}"
          curl -fsSLo checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_checksums.txt"
          grep " ${F}$" checksums.txt | sha256sum -c -
          tar xzf "$F" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Scan working tree and history
        run: gitleaks git . --redact --no-banner --verbose

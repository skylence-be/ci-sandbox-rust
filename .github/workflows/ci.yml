name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  lint-workflows:
    name: Workflow lint (actionlint + zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with: { tool: zizmor@1.26.1 }
      - name: Install actionlint (pinned, checksum-verified, no root)
        run: |
          set -euo pipefail
          V=1.7.12
          F="actionlint_${V}_linux_amd64.tar.gz"
          curl -fsSLo "$F" "https://github.com/rhysd/actionlint/releases/download/v${V}/${F}"
          curl -fsSLo checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${V}/actionlint_${V}_checksums.txt"
          grep " ${F}$" checksums.txt | sha256sum -c -
          tar xzf "$F" actionlint
          mkdir -p "$HOME/.local/bin"
          install actionlint "$HOME/.local/bin/actionlint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: actionlint
      - run: zizmor .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch head
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch head
        with: { components: clippy }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with: { tool: cargo-deny }
      - run: cargo deny check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fmt, clippy, deny]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch head
        with: { components: llvm-tools-preview }
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with: { tool: cargo-llvm-cov }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Runs the whole test suite under llvm-cov (no pipe into tee: the default
      # run shell lacks pipefail, so piping would mask failures). The spawned
      # binary in tests/cli.rs is instrumented too, so main() counts honestly.
      - name: Test with coverage (gate 80% lines)
        env:
          COVERAGE_MIN: "80"
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --all-features \
            --lcov --output-path lcov.info \
            --fail-under-lines "$COVERAGE_MIN"
          {
            echo "### Rust coverage (gate: ${COVERAGE_MIN}% lines)"
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage
          path: lcov.info

  summary:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint-workflows, fmt, clippy, deny, test]
    if: always()
    env:
      R_LINTWF: ${{ needs.lint-workflows.result }}
      R_FMT: ${{ needs.fmt.result }}
      R_CLIPPY: ${{ needs.clippy.result }}
      R_DENY: ${{ needs.deny.result }}
      R_TEST: ${{ needs.test.result }}
    steps:
      - name: Render summary
        run: |
          {
            echo "### Rust CI (hosted)"
            echo ""
            echo "| Stage | Result |"
            echo "|-------|--------|"
            echo "| Workflow lint | $R_LINTWF |"
            echo "| Format | $R_FMT |"
            echo "| Clippy | $R_CLIPPY |"
            echo "| cargo-deny | $R_DENY |"
            echo "| Test | $R_TEST |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if any stage failed
        run: |
          for r in "$R_LINTWF" "$R_FMT" "$R_CLIPPY" "$R_DENY" "$R_TEST"; do
            [ "$r" = "success" ] || { echo "::error::a stage did not succeed ($r)"; exit 1; }
          done

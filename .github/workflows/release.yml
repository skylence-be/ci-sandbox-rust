name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions: {}

concurrency:
  group: release-ci-sandbox-rust
  cancel-in-progress: false

jobs:
  tag:
    name: Compute and push tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: "0", persist-credentials: "false" }
      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          [ -n "$LATEST" ] || LATEST="v0.0.0"
          VER="${LATEST#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1); MINOR=$(echo "$VER" | cut -d. -f2); PATCH=$(echo "$VER" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
      - name: Create tag via API (no git credentials on disk)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$TAG" -f sha="$GITHUB_SHA"

  build:
    name: Build (${{ matrix.target }})
    needs: [tag]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin,       runner: macos-15-intel }
          - { target: aarch64-apple-darwin,      runner: macos-latest }
          - { target: x86_64-pc-windows-msvc,    runner: windows-latest }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: "false"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch head
      - name: Add target
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"
      - name: Build
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "$TARGET"
      - name: Package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist stage
          case "$TARGET" in
            *windows*) BIN="ci-sandbox-rust.exe"; EXT="zip" ;;
            *)         BIN="ci-sandbox-rust";     EXT="tar.xz" ;;
          esac
          cp "target/$TARGET/release/$BIN" stage/
          cp README.md LICENSE stage/
          ARCHIVE="ci-sandbox-rust-$TAG-$TARGET.$EXT"
          if [ "$EXT" = "zip" ]; then
            (cd stage && 7z a "../dist/$ARCHIVE" .) >/dev/null
          else
            tar -cJf "dist/$ARCHIVE" -C stage .
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  installers-macos:
    name: macOS installers (universal pkg + dmg)
    needs: [tag, build]
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: archive-*apple-darwin
          path: in/
          merge-multiple: true
      - name: Build universal binary, pkg, dmg
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          mkdir -p a b dist pkgroot dmgroot
          tar -xJf "in/ci-sandbox-rust-$TAG-x86_64-apple-darwin.tar.xz" -C a
          tar -xJf "in/ci-sandbox-rust-$TAG-aarch64-apple-darwin.tar.xz" -C b
          lipo -create a/ci-sandbox-rust b/ci-sandbox-rust -output ci-sandbox-rust
          lipo -archs ci-sandbox-rust | grep -q x86_64
          lipo -archs ci-sandbox-rust | grep -q arm64
          cp ci-sandbox-rust pkgroot/
          pkgbuild --root pkgroot \
            --identifier be.skylence.ci-sandbox-rust \
            --version "$VER" \
            --install-location /usr/local/bin \
            "dist/ci-sandbox-rust-$TAG-universal.pkg"
          cp ci-sandbox-rust README.md LICENSE dmgroot/
          hdiutil create -volname "ci-sandbox-rust" -srcfolder dmgroot -ov -format UDZO \
            "dist/ci-sandbox-rust-$TAG-universal.dmg"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-macos
          path: dist/*
          if-no-files-found: error

  installers-windows:
    name: Windows installer (msi)
    needs: [tag, build]
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: archive-x86_64-pc-windows-msvc
          path: in/
      - name: Build MSI (WiX, pinned)
        shell: bash
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          mkdir -p bin dist
          7z x "in/ci-sandbox-rust-$TAG-x86_64-pc-windows-msvc.zip" -obin >/dev/null
          dotnet tool install --global wix --version 5.0.2
          export PATH="$PATH:$HOME/.dotnet/tools"
          wix build -arch x64 \
            -d "Version=$VER" \
            -d "BinPath=bin/ci-sandbox-rust.exe" \
            -o "dist/ci-sandbox-rust-$TAG-x86_64-pc-windows-msvc.msi" \
            packaging/windows/ci-sandbox-rust.wxs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-windows
          path: dist/*
          if-no-files-found: error

  publish:
    name: Attest, sign, release
    needs: [tag, build, installers-macos, installers-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # Checkout FIRST (it cleans the workspace) so syft can read Cargo.lock for
      # a dependency SBOM; the artifact downloads below then populate dist/.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: archive-*
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: installers-*
          path: dist/
          merge-multiple: true
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.tar.xz ./*.zip ./*.pkg ./*.dmg ./*.msi ./sbom.spdx.json > SHA256SUMS
          cat SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: |
            dist/*.tar.xz
            dist/*.zip
            dist/*.pkg
            dist/*.dmg
            dist/*.msi
          sbom-path: dist/sbom.spdx.json
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Keyless cosign sign + self-verify SHA256SUMS
        run: |
          set -euo pipefail
          cosign sign-blob --yes dist/SHA256SUMS --bundle dist/SHA256SUMS.sigstore.json
          cosign verify-blob dist/SHA256SUMS \
            --bundle dist/SHA256SUMS.sigstore.json \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" -R "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes \
            dist/*.tar.xz dist/*.zip dist/*.pkg dist/*.dmg dist/*.msi \
            dist/SHA256SUMS dist/SHA256SUMS.sigstore.json dist/sbom.spdx.json
